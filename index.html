<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Banana Volt GP — Jungle Circuit</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { height:100%; overflow:hidden; background:#000; font-family:'Trebuchet MS','Segoe UI',sans-serif; }
  #c { display:block; width:100%; height:100%; touch-action:none; }
  #hud { position:fixed; top:0; left:0; right:0; display:flex; justify-content:space-between; align-items:center; padding:12px 14px; pointer-events:none; gap:8px; }
  .chip { background:rgba(10,18,14,0.5); color:#fff; font-size:17px; font-weight:bold; padding:8px 15px;
          border-radius:24px; backdrop-filter:blur(6px); text-shadow:0 1px 4px rgba(0,0,0,0.5); white-space:nowrap; }
  #itemSlot { position:fixed; top:10px; left:50%; transform:translateX(-50%); width:62px; height:62px;
              border-radius:16px; background:rgba(10,18,14,0.55); border:2px solid rgba(255,255,255,0.35);
              display:flex; align-items:center; justify-content:center; font-size:34px; backdrop-filter:blur(6px);
              pointer-events:none; }
  #minimap { position:fixed; top:84px; right:12px; background:rgba(0,0,0,0.32); border-radius:12px; pointer-events:none; }
  #ctrls { position:fixed; bottom:0; left:0; right:0; display:flex; gap:10px; padding:12px; }
  .btn { flex:1; height:84px; border:none; border-radius:18px; background:rgba(16,32,22,0.5); color:#fff;
         font-size:36px; cursor:pointer; user-select:none; -webkit-user-select:none; backdrop-filter:blur(6px);
         border:1px solid rgba(255,255,255,0.12); }
  .btn:active { background:rgba(60,110,70,0.65); }
  #brake { flex:0 0 88px; font-size:15px; font-weight:bold; background:rgba(90,50,35,0.55); }
  #brake:active { background:rgba(140,80,55,0.75); }
  #useBtn { position:fixed; bottom:112px; left:50%; transform:translateX(-50%); padding:14px 34px;
            font-size:18px; font-weight:bold; border:none; border-radius:30px; color:#2a1f04;
            background:linear-gradient(180deg,#ffd75e,#eab51c); box-shadow:0 6px 24px rgba(242,193,46,0.5);
            cursor:pointer; user-select:none; -webkit-user-select:none; }
  #useBtn:active { transform:translateX(-50%) scale(0.95); }
  #big { position:fixed; inset:0; display:flex; align-items:center; justify-content:center; pointer-events:none;
         font-size:clamp(80px,18vw,150px); font-weight:bold; color:#fff;
         text-shadow:0 6px 30px rgba(0,0,0,0.55), 0 0 60px rgba(255,255,255,0.25); }
  #overlay { position:fixed; inset:0; background:radial-gradient(ellipse at 50% 35%, rgba(20,42,28,0.86), rgba(5,12,8,0.94));
             display:flex; flex-direction:column; align-items:center; justify-content:center; gap:20px;
             text-align:center; padding:24px; z-index:10; }
  #overlay h1 { color:#f2c12e; font-size:clamp(38px,9vw,68px); letter-spacing:2px;
                text-shadow:0 6px 24px rgba(0,0,0,0.6), 0 0 50px rgba(242,193,46,0.25); }
  #overlay p { color:#dcebd2; font-size:17px; max-width:470px; line-height:1.7; }
  #overlay button { padding:18px 56px; font-size:23px; font-weight:bold; border:none; border-radius:16px;
                    background:linear-gradient(180deg,#ffd75e,#eab51c); color:#3a2a05; cursor:pointer;
                    box-shadow:0 8px 30px rgba(242,193,46,0.4); }
  #overlay button:active { transform:scale(0.96); }
  #charGrid { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; max-width:460px; width:100%; }
  .charBtn { padding:12px 4px 10px; border-radius:14px; border:2px solid rgba(255,255,255,0.25);
             background:rgba(255,255,255,0.07); color:#fff; font-weight:bold; font-size:14px;
             cursor:pointer; font-family:inherit; }
  .charBtn .sw { display:block; width:28px; height:28px; border-radius:50%; margin:0 auto 7px;
                 border:2px solid rgba(255,255,255,0.5); }
  .charBtn.sel { border-color:#f2c12e; background:rgba(242,193,46,0.2);
                 box-shadow:0 0 16px rgba(242,193,46,0.4); transform:scale(1.05); }
  .hidden { display:none !important; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hud">
  <span class="chip" id="hudLap">Lap 1/3</span>
  <span class="chip" id="hudCoins">&#129689; 0</span>
  <span class="chip" id="hudPos">4th of 4</span>
</div>
<div id="itemSlot"></div>
<canvas id="minimap" width="124" height="100"></canvas>
<button id="useBtn" class="hidden">USE ITEM</button>
<div id="big"></div>
<div id="ctrls">
  <button class="btn" id="btnL" aria-label="Steer left">&#8592;</button>
  <button class="btn" id="brake" aria-label="Brake">BRAKE</button>
  <button class="btn" id="btnR" aria-label="Steer right">&#8594;</button>
</div>
<div id="overlay">
  <h1>BANANA VOLT GP</h1>
  <p>Pick your racer &middot; 3 laps of Jungle Circuit.<br>
  Hold &#8592; / &#8594; to steer, grab <b>? boxes</b> for items, collect coins for speed.
  Keyboard: arrows + <b>space</b>.</p>
  <div id="charGrid"></div>
  <button id="startBtn">Start race</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function(){
var canvas = document.getElementById('c');
var renderer = new THREE.WebGLRenderer({canvas:canvas, antialias:true});
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.outputEncoding = THREE.sRGBEncoding;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;

/* ============ toon shading setup ============ */
var gradData = new Uint8Array([100, 165, 215, 255]);
var gradTex = new THREE.DataTexture(gradData, 4, 1, THREE.LuminanceFormat);
gradTex.minFilter = THREE.NearestFilter;
gradTex.magFilter = THREE.NearestFilter;
gradTex.needsUpdate = true;
function toon(color){
  return new THREE.MeshToonMaterial({color:color, gradientMap:gradTex});
}
var outlineMat = new THREE.MeshBasicMaterial({color:0x1c1c24, side:THREE.BackSide});
function addOutline(parent, mesh, scale){
  var o=new THREE.Mesh(mesh.geometry, outlineMat);
  o.position.copy(mesh.position);
  o.rotation.copy(mesh.rotation);
  o.scale.copy(mesh.scale).multiplyScalar(scale||1.06);
  parent.add(o);
}

var scene = new THREE.Scene();
scene.fog = new THREE.Fog(0xcfe7f8, 100, 380);

var camera = new THREE.PerspectiveCamera(62, window.innerWidth/window.innerHeight, 0.1, 700);
camera.position.set(0, 10, 16);

window.addEventListener('resize', function(){
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

/* ============ audio ============ */
var AC=null, master, engOsc, engGain, engFilter;
function initAudio(){
  if(AC) return;
  try{
    AC=new (window.AudioContext||window.webkitAudioContext)();
    master=AC.createGain(); master.gain.value=0.22; master.connect(AC.destination);
    engOsc=AC.createOscillator(); engOsc.type='triangle';
    engFilter=AC.createBiquadFilter(); engFilter.type='lowpass'; engFilter.frequency.value=900;
    engGain=AC.createGain(); engGain.gain.value=0;
    engOsc.connect(engFilter); engFilter.connect(engGain); engGain.connect(master);
    engOsc.start();
  }catch(e){ AC=null; }
}
function blip(freq, dur, type, vol, slideTo){
  if(!AC) return;
  var o=AC.createOscillator(), g=AC.createGain();
  o.type=type||'sine'; o.frequency.setValueAtTime(freq, AC.currentTime);
  if(slideTo) o.frequency.exponentialRampToValueAtTime(slideTo, AC.currentTime+dur);
  g.gain.setValueAtTime(vol||0.25, AC.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, AC.currentTime+dur);
  o.connect(g); g.connect(master);
  o.start(); o.stop(AC.currentTime+dur+0.02);
}

/* ============ sky & light ============ */
var sky = new THREE.Mesh(
  new THREE.SphereGeometry(560, 22, 14),
  new THREE.ShaderMaterial({
    side: THREE.BackSide, depthWrite:false, fog:false,
    vertexShader:'varying vec3 vP; void main(){ vP=position; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0); }',
    fragmentShader:'varying vec3 vP; void main(){ float h=clamp(normalize(vP).y,0.0,1.0); vec3 c=mix(vec3(0.87,0.94,0.99), vec3(0.2,0.52,0.96), pow(h,0.7)); gl_FragColor=vec4(c,1.0); }'
  })
);
scene.add(sky);

function radialSprite(inner, outer, size){
  var cv2=document.createElement('canvas'); cv2.width=cv2.height=size||128;
  var c2=cv2.getContext('2d');
  var gr=c2.createRadialGradient(size/2,size/2,0,size/2,size/2,size/2);
  gr.addColorStop(0, inner); gr.addColorStop(1, outer);
  c2.fillStyle=gr; c2.fillRect(0,0,size,size);
  return new THREE.CanvasTexture(cv2);
}
var sunGlow = new THREE.Sprite(new THREE.SpriteMaterial({
  map:radialSprite('rgba(255,250,215,1)','rgba(255,250,215,0)',128),
  transparent:true, depthWrite:false, fog:false
}));
sunGlow.scale.set(140,140,1);
sunGlow.position.set(220, 300, 130);
scene.add(sunGlow);

scene.add(new THREE.HemisphereLight(0xcfe6ff, 0x6f9f55, 0.8));
var sun = new THREE.DirectionalLight(0xfff0c8, 1.3);
sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
sun.shadow.camera.left=-60; sun.shadow.camera.right=60;
sun.shadow.camera.top=60; sun.shadow.camera.bottom=-60;
sun.shadow.camera.near=20; sun.shadow.camera.far=240;
sun.shadow.bias=-0.0008;
scene.add(sun);
scene.add(sun.target);
var rim = new THREE.DirectionalLight(0xaaccff, 0.35);
rim.position.set(-40, 30, -50);
scene.add(rim);

/* environment cube for reflections */
function gradFace(top, bottom){
  var cv2=document.createElement('canvas'); cv2.width=cv2.height=64;
  var c2=cv2.getContext('2d');
  var gr=c2.createLinearGradient(0,0,0,64);
  gr.addColorStop(0, top); gr.addColorStop(1, bottom);
  c2.fillStyle=gr; c2.fillRect(0,0,64,64);
  return cv2;
}
var envFaces=[
  gradFace('#9fc6ee','#cfe6f7'), gradFace('#9fc6ee','#cfe6f7'),
  gradFace('#5d92d8','#5d92d8'), gradFace('#7da868','#6b9457'),
  gradFace('#9fc6ee','#cfe6f7'), gradFace('#9fc6ee','#cfe6f7')
];
var envMap=new THREE.CubeTexture(envFaces);
envMap.needsUpdate=true;

/* ============ track maths ============ */
var S = 1/5.5;
var raw = [[200,180],[500,110],[850,150],[1110,260],[1160,490],[1000,660],[780,600],[630,730],[380,810],[170,710],[110,470],[140,300]];
function catmull(pts, per){
  var out=[], n=pts.length;
  for(var i=0;i<n;i++){
    var p0=pts[(i-1+n)%n], p1=pts[i], p2=pts[(i+1)%n], p3=pts[(i+2)%n];
    for(var j=0;j<per;j++){
      var t=j/per, t2=t*t, t3=t2*t;
      out.push([
        S*0.5*((2*p1[0])+(-p0[0]+p2[0])*t+(2*p0[0]-5*p1[0]+4*p2[0]-p3[0])*t2+(-p0[0]+3*p1[0]-3*p2[0]+p3[0])*t3),
        S*0.5*((2*p1[1])+(-p0[1]+p2[1])*t+(2*p0[1]-5*p1[1]+4*p2[1]-p3[1])*t2+(-p0[1]+3*p1[1]-3*p2[1]+p3[1])*t3)
      ]);
    }
  }
  return out;
}
var line = catmull(raw, 12);
var N = line.length;
var TRACK_W = 17;
var WALL_OFF = TRACK_W/2 + 2.8;
var cx=0, cz=0;
for(var ci=0;ci<N;ci++){ cx+=line[ci][0]/N; cz+=line[ci][1]/N; }
for(ci=0;ci<N;ci++){ line[ci][0]-=cx; line[ci][1]-=cz; }

var H=[];
for(var hi=0;hi<N;hi++){
  var u=hi/N*Math.PI*2;
  H.push(2.5 + 1.5*Math.sin(u*2+0.6) + 0.9*Math.sin(u*3+2.0));
}
function hAt(i){ return H[((Math.round(i)%N)+N)%N]; }
var segLen=0;
for(hi=0;hi<N;hi++){
  var nx2=line[(hi+1)%N];
  segLen+=Math.hypot(nx2[0]-line[hi][0], nx2[1]-line[hi][1])/N;
}
function pitchAt(i){ return Math.atan2(hAt(i+2)-hAt(i-2), segLen*4); }

function nearestIdx(x,z,hint){
  var best=0, bd=1e18, i, dx, dz, d, k;
  if(hint!==undefined){
    for(k=-9;k<=9;k++){
      i=(hint+k+N)%N;
      dx=line[i][0]-x; dz=line[i][1]-z; d=dx*dx+dz*dz;
      if(d<bd){bd=d;best=i;}
    }
    return [best, Math.sqrt(bd)];
  }
  for(i=0;i<N;i++){
    dx=line[i][0]-x; dz=line[i][1]-z; d=dx*dx+dz*dz;
    if(d<bd){bd=d;best=i;}
  }
  return [best, Math.sqrt(bd)];
}
function tangent(i){
  i=((i%N)+N)%N;
  var a=line[(i+2)%N], b=line[(i-2+N)%N];
  return Math.atan2(a[1]-b[1], a[0]-b[0]);
}
function lateral(i, off){
  i=((i%N)+N)%N;
  var t=tangent(i);
  return [line[i][0]+Math.cos(t+Math.PI/2)*off, line[i][1]+Math.sin(t+Math.PI/2)*off];
}
function rnd(seed){ var x=Math.sin(seed*127.1)*43758.5453; return x-Math.floor(x); }

/* ============ textures ============ */
function noiseTexture(base, spots, density, size){
  var cv2=document.createElement('canvas'); cv2.width=cv2.height=size;
  var c2=cv2.getContext('2d');
  c2.fillStyle=base; c2.fillRect(0,0,size,size);
  for(var i=0;i<density;i++){
    c2.fillStyle=spots[i%spots.length];
    var r=Math.random()*2.4+0.6;
    c2.beginPath();
    c2.arc(Math.random()*size, Math.random()*size, r, 0, 7);
    c2.fill();
  }
  var t=new THREE.CanvasTexture(cv2);
  t.wrapS=t.wrapT=THREE.RepeatWrapping;
  return t;
}
var grassTex = noiseTexture('#76C25C', ['#69b350','#84d069','#5fa648','#8fd874'], 1400, 256);
grassTex.repeat.set(70,70);
var roadTex = noiseTexture('#4a505a', ['#414750','#545b66','#3e444d','#5d646f'], 1600, 256);
var dirtTex = noiseTexture('#9a7c54', ['#8c6f4a','#a8895e','#7d623e'], 900, 128);

/* ============ world ============ */
var ground = new THREE.Mesh(
  new THREE.PlaneGeometry(900, 900),
  new THREE.MeshLambertMaterial({map:grassTex})
);
ground.rotation.x=-Math.PI/2;
ground.position.y=-0.02;
ground.receiveShadow=true;
scene.add(ground);

function buildRibbon(halfW, yOff, mat, uvV, shadow){
  var pos=[], uv=[], idx=[];
  for(var i=0;i<=N;i++){
    var ii=i%N, t=tangent(ii), y=hAt(ii)+yOff;
    var nx=Math.cos(t+Math.PI/2), nz=Math.sin(t+Math.PI/2);
    pos.push(line[ii][0]-nx*halfW, y, line[ii][1]-nz*halfW);
    pos.push(line[ii][0]+nx*halfW, y, line[ii][1]+nz*halfW);
    uv.push(0, i*(uvV||0.3), 1, i*(uvV||0.3));
  }
  for(i=0;i<N;i++){
    var a=i*2;
    idx.push(a,a+1,a+2, a+1,a+3,a+2);
  }
  var g=new THREE.BufferGeometry();
  g.setAttribute('position', new THREE.Float32BufferAttribute(pos,3));
  g.setAttribute('uv', new THREE.Float32BufferAttribute(uv,2));
  g.setIndex(idx);
  g.computeVertexNormals();
  var m=new THREE.Mesh(g, mat);
  if(shadow!==false) m.receiveShadow=true;
  return m;
}
var shoulderHalf=TRACK_W/2+1.7;
scene.add(buildRibbon(shoulderHalf, 0.01, new THREE.MeshLambertMaterial({color:0xbdb29a})));
scene.add(buildRibbon(TRACK_W/2, 0.02, new THREE.MeshLambertMaterial({map:roadTex}), 0.35));
scene.add(buildRibbon(0.18, 0.045, new THREE.MeshBasicMaterial({color:0xe8e8e8}), 0, false));

function buildEdgeLine(side){
  var pos=[], idx=[], inner=TRACK_W/2-0.45, outer=TRACK_W/2-0.15;
  for(var i=0;i<=N;i++){
    var ii=i%N, t=tangent(ii), y=hAt(ii)+0.04;
    var nx=Math.cos(t+Math.PI/2)*side, nz=Math.sin(t+Math.PI/2)*side;
    pos.push(line[ii][0]+nx*inner, y, line[ii][1]+nz*inner);
    pos.push(line[ii][0]+nx*outer, y, line[ii][1]+nz*outer);
  }
  for(i=0;i<N;i++){
    var a=i*2;
    idx.push(a,a+1,a+2, a+1,a+3,a+2, a,a+2,a+1, a+1,a+2,a+3);
  }
  var g=new THREE.BufferGeometry();
  g.setAttribute('position', new THREE.Float32BufferAttribute(pos,3));
  g.setIndex(idx);
  return new THREE.Mesh(g, new THREE.MeshBasicMaterial({color:0xf0f0f0}));
}
scene.add(buildEdgeLine(1));
scene.add(buildEdgeLine(-1));

function buildKerb(side){
  var pos=[], cols=[], idx=[], inner=TRACK_W/2-1.1, outer=TRACK_W/2+0.25;
  for(var i=0;i<=N;i++){
    var ii=i%N, t=tangent(ii), y=hAt(ii)+0.05;
    var nx=Math.cos(t+Math.PI/2)*side, nz=Math.sin(t+Math.PI/2)*side;
    pos.push(line[ii][0]+nx*inner, y, line[ii][1]+nz*inner);
    pos.push(line[ii][0]+nx*outer, y, line[ii][1]+nz*outer);
    var red=Math.floor(i/3)%2===0;
    var r=red?0.88:1, g2=red?0.16:1, b=red?0.13:1;
    cols.push(r,g2,b, r,g2,b);
  }
  for(i=0;i<N;i++){
    var a=i*2;
    if(side>0) idx.push(a,a+1,a+2, a+1,a+3,a+2);
    else idx.push(a,a+2,a+1, a+1,a+2,a+3);
  }
  var g=new THREE.BufferGeometry();
  g.setAttribute('position', new THREE.Float32BufferAttribute(pos,3));
  g.setAttribute('color', new THREE.Float32BufferAttribute(cols,3));
  g.setIndex(idx);
  g.computeVertexNormals();
  var m=new THREE.Mesh(g, new THREE.MeshLambertMaterial({vertexColors:true}));
  m.receiveShadow=true;
  return m;
}
scene.add(buildKerb(1));
scene.add(buildKerb(-1));

function buildSkirt(side){
  var pos=[], uv=[], idx=[];
  for(var i=0;i<=N;i++){
    var ii=i%N, t=tangent(ii), y=hAt(ii);
    var nx=Math.cos(t+Math.PI/2)*side, nz=Math.sin(t+Math.PI/2)*side;
    var ex=line[ii][0]+nx*shoulderHalf, ez=line[ii][1]+nz*shoulderHalf;
    pos.push(ex, y+0.01, ez);
    pos.push(ex+nx*1.6, -0.4, ez+nz*1.6);
    uv.push(i*0.3, 1, i*0.3, 0);
  }
  for(i=0;i<N;i++){
    var a=i*2;
    idx.push(a,a+1,a+2, a+1,a+3,a+2, a,a+2,a+1, a+1,a+2,a+3);
  }
  var g=new THREE.BufferGeometry();
  g.setAttribute('position', new THREE.Float32BufferAttribute(pos,3));
  g.setAttribute('uv', new THREE.Float32BufferAttribute(uv,2));
  g.setIndex(idx);
  g.computeVertexNormals();
  var m=new THREE.Mesh(g, new THREE.MeshLambertMaterial({map:dirtTex}));
  m.receiveShadow=true;
  return m;
}
scene.add(buildSkirt(1));
scene.add(buildSkirt(-1));

function buildWall(side){
  var pos=[], cols=[], idx=[], h=1.0;
  for(var i=0;i<=N;i++){
    var ii=i%N, t=tangent(ii), y=hAt(ii);
    var nx=Math.cos(t+Math.PI/2)*side, nz=Math.sin(t+Math.PI/2)*side;
    var wx=line[ii][0]+nx*WALL_OFF, wz=line[ii][1]+nz*WALL_OFF;
    pos.push(wx, y, wz);
    pos.push(wx, y+h, wz);
    var red=Math.floor(i/5)%2===0;
    var r=red?0.85:0.95, g2=red?0.2:0.95, b=red?0.18:0.95;
    cols.push(r*0.8,g2*0.8,b*0.8, r,g2,b);
  }
  for(i=0;i<N;i++){
    var a=i*2;
    idx.push(a,a+1,a+2, a+1,a+3,a+2, a,a+2,a+1, a+1,a+2,a+3);
  }
  var g=new THREE.BufferGeometry();
  g.setAttribute('position', new THREE.Float32BufferAttribute(pos,3));
  g.setAttribute('color', new THREE.Float32BufferAttribute(cols,3));
  g.setIndex(idx);
  g.computeVertexNormals();
  var m=new THREE.Mesh(g, new THREE.MeshLambertMaterial({vertexColors:true}));
  m.receiveShadow=true;
  return m;
}
scene.add(buildWall(1));
scene.add(buildWall(-1));

var dashMat=new THREE.MeshBasicMaterial({color:0xeeeeee});
var dashGeo=new THREE.PlaneGeometry(2.3, 0.3);
for(var di=3; di<N; di+=6){
  var dm=new THREE.Mesh(dashGeo, dashMat);
  dm.rotation.x=-Math.PI/2;
  dm.rotation.z=-tangent(di);
  dm.position.set(line[di][0], hAt(di)+0.06, line[di][1]);
  scene.add(dm);
}

/* finish line, gantry & start lights */

/* ============ helmet texture ============ */
function helmetTexture(baseHex, stripeHex){
  var cv2=document.createElement('canvas'); cv2.width=256; cv2.height=128;
  var c2=cv2.getContext('2d');
  c2.fillStyle=baseHex; c2.fillRect(0,0,256,128);
  c2.fillStyle=stripeHex;
  [40, 96, 152, 208].forEach(function(x){
    c2.fillRect(x-11, 0, 22, 128);
  });
  c2.fillStyle='#ffffff';
  c2.fillRect(118, 62, 56, 26);
  for(var rr=0;rr<2;rr++)for(var ccx=0;ccx<7;ccx++){
    if((rr+ccx)%2===0){
      c2.fillStyle='#D63A2E';
      c2.fillRect(118+ccx*8, 62+rr*13, 8, 13);
    }
  }
  c2.fillStyle='rgba(255,255,255,0.85)';
  c2.beginPath();
  c2.ellipse(70, 18, 26, 9, -0.2, 0, 7);
  c2.fill();
  return new THREE.CanvasTexture(cv2);
}

function useItem(k){
  if(!k.item || !running || k.done || k.spin>0) return;
  var it=k.item;
  k.item=null;
  if(it==='boost'){
    k.boost=70;
    blip(300,0.5,'sawtooth',0.18,900);
  } else if(it==='banana'){
    var bx=k.x-Math.cos(k.a)*4.2, bz=k.z-Math.sin(k.a)*4.2;
    var nb=nearestIdx(bx,bz,k.idx);
    var m=getBananaMesh();
    m.position.set(bx, hAt(nb[0]), bz);
    m.visible=true;
    var t0b=tangent(nb[0]);
    var lat=(bx-line[nb[0]][0])*Math.cos(t0b+Math.PI/2)+(bz-line[nb[0]][1])*Math.sin(t0b+Math.PI/2);
    bananas.push({i:nb[0], off:lat, gone:0, mesh:m, dropped:true, immune:k, immuneT:frame+40});
    blip(500,0.15,'square',0.15);
  } else if(it==='coconut'){
    var sorted=karts.slice().sort(function(a,b){return score(b)-score(a);});
    var myRank=sorted.indexOf(k);
    var target=myRank>0? sorted[myRank-1] : null;
    var cm=makeCoco();
    cm.position.set(k.x+Math.cos(k.a)*3.5, k.y+1, k.z+Math.sin(k.a)*3.5);
    projectiles.push({mesh:cm, x:cm.position.x, z:cm.position.z, a:k.a, target:target, life:330, owner:k, idx:k.idx});
    blip(700,0.25,'square',0.18,200);
  }
  if(k===player) updateItemHUD();
}

function step(){
  for(var ki=0;ki<4;ki++){
    var k=karts[ki];
    if(k.done){
      k.speed*=0.96;
      k.x+=Math.cos(k.a)*k.speed; k.z+=Math.sin(k.a)*k.speed;
      var nd2=nearestIdx(k.x,k.z,k.idx); k.idx=nd2[0]; k.y=hAt(k.idx);
      continue;
    }
    if(countdown>0) continue;
    var steer=0, brake=false;
    if(k.ai){
      var look=(k.idx+15)%N;
      var tx=line[look][0], tz=line[look][1];
      for(var bi=0;bi<bananas.length;bi++){
        var b=bananas[bi];
        if(b.gone) continue;
        if(((b.i-k.idx+N)%N)<20){
          var bp=lateral(b.i,b.off);
          var ddx=bp[0]-k.x, ddz=bp[1]-k.z;
          if(ddx*ddx+ddz*ddz<75){
            var pp=lateral(look, b.off>0?-5.5:5.5);
            tx=pp[0]; tz=pp[1];
          }
        }
      }
      var want=Math.atan2(tz-k.z,tx-k.x), diff=want-k.a;
      while(diff>Math.PI)diff-=2*Math.PI; while(diff<-Math.PI)diff+=2*Math.PI;
      steer=Math.max(-1,Math.min(1,diff*2.4));
      if(k.item && k.itemTimer>0){ k.itemTimer--; if(k.itemTimer===0) useItem(k); }
    } else {
      if(keys['ArrowLeft'])steer=-1;
      if(keys['ArrowRight'])steer=1;
      brake=!!keys['ArrowDown'];
    }
    var res=nearestIdx(k.x,k.z,k.idx);
    var ni=res[0], dist=res[1];
    var max=(k.ai?k.base:0.6) + Math.min(k.coins,10)*0.005;
    if(dist>TRACK_W/2)max*=0.45;
    if(k.boost>0){max=0.9;k.boost--;}
    if(k.spin>0){
      k.spin--; k.va+=0.35; k.speed*=0.93;
    } else {
      k.speed += (brake? -0.035 : 0.012);
      if(k.speed>max)k.speed=Math.max(max,k.speed*0.94);
      if(k.speed<0)k.speed=0;
      var sAmt=steer*0.052*Math.min(1,k.speed/0.32);
      k.a+=sAmt;
      k.va=k.a;
      k.roll += (steer*0.12 - k.roll)*0.15;
      if(!k.ai && Math.abs(steer)>0.7 && k.speed>0.42 && frame%3===0){
        spawnParticle(k.x-Math.cos(k.a)*1.8, k.y+0.3, k.z-Math.sin(k.a)*1.8, pTexSpark, 0.55);
      }
    }
    k.x+=Math.cos(k.a)*k.speed;
    k.z+=Math.sin(k.a)*k.speed;
    var t0=tangent(ni);
    var nx0=Math.cos(t0+Math.PI/2), nz0=Math.sin(t0+Math.PI/2);
    var lat=(k.x-line[ni][0])*nx0 + (k.z-line[ni][1])*nz0;
    var lim=WALL_OFF-1.4;
    if(Math.abs(lat)>lim){
      var sgn=lat>0?1:-1;
      var wp=lateral(ni, sgn*lim);
      k.x=wp[0]; k.z=wp[1];
      k.speed*=0.85;
      if(k===player) blip(140,0.1,'square',0.1);
    }
    k.y += (hAt(ni)-k.y)*0.35;
    var prev=k.idx;
    k.idx=ni;
    if(prev>N*0.85 && ni<N*0.15){
      k.lap++;
      if(k.lap>3 && !k.done){
        k.done=true; k.finishPos=finishOrder++;
        if(!k.ai) endRace();
      } else if(k===player) blip(880,0.2,'sine',0.2,1320);
    } else if(prev<N*0.15 && ni>N*0.85){ k.lap--; }
    for(var bj=0;bj<bananas.length;bj++){
      var bb=bananas[bj];
      if(bb.gone){
        if(!bb.dropped && frame>bb.gone){ bb.gone=0; bb.mesh.visible=true; }
        continue;
      }
      if(bb.immune===k && frame<bb.immuneT) continue;
      var bpp=lateral(bb.i,bb.off);
      var dx2=bpp[0]-k.x, dz2=bpp[1]-k.z;
      if(dx2*dx2+dz2*dz2<7 && k.spin<=0){
        k.spin=46;
        if(bb.dropped){ bb.gone=1; releaseBananaMesh(bb.mesh); }
        else { bb.gone=frame+420; bb.mesh.visible=false; }
        if(k===player) blip(160,0.35,'sawtooth',0.25,60);
      }
    }
    for(var bo=0;bo<boosts.length;bo++){
      var bpt=line[boosts[bo].i];
      var dx3=bpt[0]-k.x, dz3=bpt[1]-k.z;
      if(dx3*dx3+dz3*dz3<24 && k.boost<30){
        k.boost=44;
        if(k===player) blip(300,0.4,'sawtooth',0.15,800);
      }
    }
    for(var ix=0;ix<itemBoxes.length;ix++){
      var box=itemBoxes[ix];
      if(box.gone){ if(frame>box.gone){ box.gone=0; box.mesh.visible=true; } continue; }
      var bxp=lateral(box.i, box.off);
      var dxi=bxp[0]-k.x, dzi=bxp[1]-k.z;
      if(dxi*dxi+dzi*dzi<6.5){
        box.gone=frame+300;
        box.mesh.visible=false;
        if(!k.item){
          k.item=ITEMS[Math.floor(Math.random()*ITEMS.length)];
          if(k.ai) k.itemTimer=60+Math.floor(Math.random()*140);
          if(k===player){ updateItemHUD(); blip(660,0.12,'square',0.18); blip(990,0.12,'square',0.15); }
        }
        for(var sp2=0;sp2<5;sp2++) spawnParticle(bxp[0], k.y+1.3, bxp[1], pTexBoost, 0.7);
      }
    }
    for(var cn=0;cn<coins.length;cn++){
      var coin=coins[cn];
      if(coin.gone) continue;
      var cp=lateral(coin.i, coin.off);
      var dxc=cp[0]-k.x, dzc=cp[1]-k.z;
      if(dxc*dxc+dzc*dzc<4){
        coin.gone=true;
        coin.mesh.visible=false;
        k.coins++;
        if(k===player){
          blip(1320,0.1,'sine',0.18);
          document.getElementById('hudCoins').innerHTML='&#129689; '+k.coins;
        }
      }
    }
    if(k.boost>0 && frame%2===0){
      spawnParticle(k.x-Math.cos(k.a)*3.2, k.y+0.7, k.z-Math.sin(k.a)*3.2, pTexBoost, 0.8);
    }
  }
  /* projectiles */
  for(var pj=projectiles.length-1;pj>=0;pj--){
    var pr2=projectiles[pj];
    pr2.life--;
    var spd=0.95;
    if(pr2.target && !pr2.target.done){
      var wantA=Math.atan2(pr2.target.z-pr2.z, pr2.target.x-pr2.x);
      var dA=wantA-pr2.a;
      while(dA>Math.PI)dA-=2*Math.PI; while(dA<-Math.PI)dA+=2*Math.PI;
      pr2.a+=Math.max(-0.06,Math.min(0.06,dA));
    }
    pr2.x+=Math.cos(pr2.a)*spd;
    pr2.z+=Math.sin(pr2.a)*spd;
    var pn=nearestIdx(pr2.x,pr2.z,pr2.idx);
    pr2.idx=pn[0];
    pr2.mesh.position.set(pr2.x, hAt(pr2.idx)+0.8, pr2.z);
    pr2.mesh.rotation.x+=0.3;
    var hit=false;
    for(var kt=0;kt<4;kt++){
      var kk=karts[kt];
      if(kk===pr2.owner || kk.done) continue;
      var dxp=kk.x-pr2.x, dzp=kk.z-pr2.z;
      if(dxp*dxp+dzp*dzp<5){
        kk.spin=46;
        hit=true;
        if(kk===player) blip(160,0.35,'sawtooth',0.25,60);
        break;
      }
    }
    if(hit || pr2.life<=0 || pn[1]>WALL_OFF-1){
      scene.remove(pr2.mesh);
      projectiles.splice(pj,1);
    }
  }
  for(var i2=0;i2<4;i2++)for(var j2=i2+1;j2<4;j2++){
    var a2=karts[i2], b2=karts[j2];
    var dx4=b2.x-a2.x, dz4=b2.z-a2.z, d4=Math.sqrt(dx4*dx4+dz4*dz4);
    if(d4<4.4 && d4>0.01){
      var push=(4.4-d4)/2;
      a2.x-=dx4/d4*push; a2.z-=dz4/d4*push;
      b2.x+=dx4/d4*push; b2.z+=dz4/d4*push;
    }
  }
  if(countdown>0){
    countdown--;
    var big=document.getElementById('big');
    var n3=Math.ceil(countdown/60);
    if(countdown===180){ lightMats[0].color.setHex(0xff2222); blip(440,0.18,'square',0.2); }
    if(countdown===120){ lightMats[1].color.setHex(0xff2222); blip(440,0.18,'square',0.2); }
    if(countdown===60){ lightMats[2].color.setHex(0xff2222); blip(440,0.18,'square',0.2); }
    if(countdown===0){
      lightMats[0].color.setHex(0x22ff66);
      lightMats[1].color.setHex(0x22ff66);
      lightMats[2].color.setHex(0x22ff66);
      big.textContent='GO!'; big.style.color='#5DEFB0';
      blip(880,0.5,'square',0.25);
      setTimeout(function(){ big.textContent=''; big.style.color='#fff'; }, 800);
    } else if(countdown<180) big.textContent=n3;
  }
}

function updateMeshes(){
  for(var i=0;i<4;i++){
    var k=karts[i], m=k.mesh;
    m.position.set(k.x, k.y + Math.sin(frame*0.25+k.bob*2)*0.015*Math.min(1,k.speed/0.3), k.z);
    m.rotation.y=-k.va;
    m.rotation.z=pitchAt(k.idx);
    m.rotation.x=k.roll||0;
    m.userData.flame.visible=k.boost>0;
    if(k.boost>0) m.userData.flame.scale.set(0.8+Math.random()*0.4, 1, 1);
    var spin=k.speed*2.4;
    for(var w=0;w<4;w++) m.userData.wheels[w].rotation.z-=spin;
    if(nameSprites[i]) nameSprites[i].position.set(k.x, k.y+4.4, k.z);
  }
  for(var bn=0;bn<bananas.length;bn++){
    if(!bananas[bn].gone) bananas[bn].mesh.rotation.y+=0.025;
  }
  for(var bm2=0;bm2<boostMats.length;bm2++){
    boostMats[bm2].opacity=0.6+0.3*Math.sin(frame*0.18+bm2);
  }
  for(var ib2=0;ib2<itemBoxes.length;ib2++){
    var box=itemBoxes[ib2];
    if(box.gone) continue;
    box.mesh.rotation.y+=0.03;
    box.mesh.rotation.x+=0.013;
    box.mesh.position.y=hAt(box.i)+1.35+Math.sin(frame*0.07+ib2)*0.12;
    box.hue=(box.hue+0.004)%1;
    box.mat.color.setHSL(box.hue, 0.75, 0.62);
  }
  for(var cn2=0;cn2<coins.length;cn2++){
    if(!coins[cn2].gone) coins[cn2].mesh.rotation.y+=0.07;
  }
  balloon.position.y=34+Math.sin(frame*0.012)*2.5;
  balloon.rotation.y=frame*0.002;
  if(AC && engGain){
    engGain.gain.value = running? 0.05+player.speed*0.12 : 0;
    engOsc.frequency.value = 130+player.speed*620 + (player.boost>0?180:0);
  }
}

function score(k){ return k.done? 1e6-k.finishPos : k.lap*N + k.idx; }

var camPos=new THREE.Vector3(0,10,16), camLook=new THREE.Vector3();
function updateCamera(){
  var fx=Math.cos(player.a), fz=Math.sin(player.a);
  var tx=player.x - fx*11, tz=player.z - fz*11;
  camPos.x += (tx-camPos.x)*0.1;
  camPos.z += (tz-camPos.z)*0.1;
  camPos.y += ((player.y+5.4)-camPos.y)*0.1;
  camera.position.copy(camPos);
  camLook.set(player.x + fx*5.5, player.y+1.5, player.z + fz*5.5);
  camera.lookAt(camLook);
  var targetFov=player.boost>0? 73 : 62;
  camera.fov += (targetFov-camera.fov)*0.08;
  camera.updateProjectionMatrix();
  sun.position.set(player.x+45, 80, player.z+28);
  sun.target.position.set(player.x, 0, player.z);
}

var mm=document.getElementById('minimap');
var mctx=mm.getContext('2d');
function drawMinimap(){
  mctx.clearRect(0,0,124,100);
  var sc=0.5, ox=62, oy=50;
  mctx.strokeStyle='rgba(255,255,255,0.85)';
  mctx.lineWidth=2.5;
  mctx.beginPath();
  for(var i=0;i<N;i++){
    var x=ox+line[i][0]*sc, y=oy+line[i][1]*sc;
    if(i)mctx.lineTo(x,y); else mctx.moveTo(x,y);
  }
  mctx.closePath(); mctx.stroke();
  for(var km=3;km>=0;km--){
    mctx.fillStyle=raceCols[km];
    mctx.beginPath();
    mctx.arc(ox+karts[km].x*sc, oy+karts[km].z*sc, km===0?4.5:3.5, 0, 7);
    mctx.fill();
    if(km===0){ mctx.strokeStyle='#fff'; mctx.lineWidth=1.5; mctx.stroke(); }
  }
}

function updateHUD(){
  var sorted=karts.slice().sort(function(a,b){return score(b)-score(a);});
  var pos=sorted.indexOf(player)+1;
  var suf=['st','nd','rd','th'];
  document.getElementById('hudLap').textContent=player.name+' \u00b7 Lap '+Math.min(player.lap,3)+'/3';
  document.getElementById('hudPos').textContent = player.done
    ? 'Finished '+player.finishPos+suf[player.finishPos-1]
    : pos+suf[pos-1]+' of 4';
}

var overlay=document.getElementById('overlay');
var olTitle=overlay.querySelector('h1');
var olText=overlay.querySelector('p');
var startBtn=document.getElementById('startBtn');
function endRace(){
  running=false;
  blip(660,0.3,'square',0.2); 
  setTimeout(function(){ blip(880,0.4,'square',0.2); },200);
  setTimeout(function(){
    var ord=['You won! \uD83C\uDFC6 1st place!','2nd place — so close!','3rd place','4th place — bananas everywhere'];
    var standing=karts.slice().sort(function(a,b){return score(b)-score(a);});
    var lines='';
    for(var si=0;si<standing.length;si++){
      lines+=(si+1)+'. '+standing[si].name+(standing[si]===player?' (you)':'')+'<br>';
    }
    olTitle.textContent='Race finished';
    olText.innerHTML='<b>'+player.name+': '+ord[player.finishPos-1]+'</b><br><br>'+lines+'<br>Coins: '+player.coins+' \u00b7 Pick a racer and go again!';
    startBtn.textContent='Race again';
    overlay.classList.remove('hidden');
  }, 1100);
}
startBtn.addEventListener('click', function(){
  initAudio();
  if(AC && AC.state==='suspended') AC.resume();
  reset();
  overlay.classList.add('hidden');
  running=true;
});

reset();
function loop(){
  frame++;
  if(running) step();
  updateMeshes();
  updateParticles();
  updateCamera();
  drawMinimap();
  updateHUD();
  renderer.render(scene, camera);
  requestAnimationFrame(loop);
}
loop();
})();
</script>
